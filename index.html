<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audiology CPD - Professional Learning Log</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4a2060;
            --primary-light: #f3edf8;
            --accent: #c9a84c;
            --success: #2e7d32;
            --text-main: #1a1a2e;
            --text-muted: #64748b;
            --bg-glass: rgba(255, 255, 255, 0.9);
            --border: #e2e8f0;
        }

        @media print {
            @page {
                margin: 0; /* Removes default browser headers/footers */
            }
            body { background: white !important; padding: 0 !important; margin: 0 !important; }
            .no-print { display: none !important; }
            .pdf-page {
                box-shadow: none !important;
                margin: 0 !important;
                width: 100% !important;
                padding: 15mm !important;
                page-break-after: auto;
            }
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            margin: 0;
            min-height: 100vh;
            color: var(--text-main);
        }

        .dashboard {
            max-width: 1000px;
            margin: 40px auto;
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }

        .input-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-weight: 700; font-size: 0.85rem; color: var(--primary); text-transform: uppercase; letter-spacing: 0.5px; }

        input, select, textarea {
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input:focus, textarea:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 4px var(--primary-light);
        }

        .btn-modern {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: transform 0.2s, background 0.3s;
        }

        .btn-modern:hover { transform: translateY(-2px); background: #351746; }

        .pdf-page {
            width: 210mm;
            min-height: 297mm;
            background: white;
            margin: 20px auto;
            padding: 20mm;
            box-shadow: 0 0 30px rgba(0,0,0,0.15);
            position: relative;
            box-sizing: border-box;
        }

        .report-header-line {
            border-bottom: 4px solid var(--primary);
            padding-bottom: 12px;
            margin-bottom: 25px;
        }

        .chip {
            padding: 6px 14px;
            background: var(--primary-light);
            color: var(--primary);
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .content-box {
            background: #f8fafc;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .content-box h3 {
            margin-top: 0;
            margin-bottom: 10px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .impact-statement {
            background: linear-gradient(to right, #4a2060, #6b3a8a);
            color: white;
            padding: 20px;
            border-radius: 10px;
            position: relative;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .impact-statement::after {
            content: "\f10d";
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            position: absolute;
            right: 20px;
            bottom: 10px;
            font-size: 3rem;
            opacity: 0.1;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [mode, setMode] = useState('edit');
            const [data, setData] = useState({
                name: '',
                jobTitle: 'Hearing Aid Audiologist',
                date: '',
                activity: '',
                category: 'Hearing Assessment & Diagnostics',
                hours: '',
                link: '',
                summary: '',
                outcomes: '',
                clinicalImpact: ''
            });

            const update = (field, val) => setData(prev => ({...prev, [field]: val}));

            const formatDate = (d) => {
                if (!d) return '';
                const dt = new Date(d + 'T12:00:00');
                return dt.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
            };

            if (mode === 'edit') {
                return (
                    <div className="dashboard no-print">
                        <div style={{textAlign: 'center', marginBottom: '40px'}}>
                            <h1 style={{color: 'var(--primary)', margin: 0, fontSize: '2.2rem'}}>CPD Entry</h1>
                            <p style={{color: '#64748b', marginTop: '8px'}}>Complete the details below for your professional log.</p>
                        </div>

                        <div className="form-grid">
                            <div className="input-group">
                                <label><i className="fa-solid fa-user"></i> Practitioner Name</label>
                                <input type="text" value={data.name} onChange={e => update('name', e.target.value)} />
                            </div>
                            <div className="input-group">
                                <label><i className="fa-solid fa-briefcase"></i> Job Title</label>
                                <input type="text" value={data.jobTitle} onChange={e => update('jobTitle', e.target.value)} />
                            </div>
                            <div className="input-group">
                                <label><i className="fa-solid fa-calendar"></i> Activity Date</label>
                                <input type="date" value={data.date} onChange={e => update('date', e.target.value)} />
                            </div>
                            <div className="input-group">
                                <label><i className="fa-solid fa-clock"></i> Duration (Hours)</label>
                                <input type="number" value={data.hours} onChange={e => update('hours', e.target.value)} />
                            </div>
                            <div className="input-group" style={{gridColumn: 'span 2'}}>
                                <label><i className="fa-solid fa-graduation-cap"></i> Activity Title</label>
                                <input type="text" value={data.activity} onChange={e => update('activity', e.target.value)} />
                            </div>
                            <div className="input-group" style={{gridColumn: 'span 2'}}>
                                <label><i className="fa-solid fa-tags"></i> Core Domain</label>
                                <select value={data.category} onChange={e => update('category', e.target.value)}>
                                    <option>Hearing Assessment & Diagnostics</option>
                                    <option>Hearing Aid Fitting & Verification</option>
                                    <option>Tinnitus & Balance Management</option>
                                    <option>Patient Communication & Counselling</option>
                                    <option>Hearing Technology & Innovation</option>
                                    <option>Safeguarding & Compliance</option>
                                    <option>Leadership & Management</option>
                                    <option>Other</option>
                                </select>
                            </div>
                            <div className="input-group" style={{gridColumn: 'span 2'}}>
                                <label><i className="fa-solid fa-link"></i> Portfolio Evidence Link</label>
                                <input type="text" value={data.link} onChange={e => update('link', e.target.value)} placeholder="https://..." />
                            </div>
                        </div>

                        <div className="input-group" style={{marginTop: '25px'}}>
                            <label>Learning Summary</label>
                            <textarea rows="4" value={data.summary} onChange={e => update('summary', e.target.value)}></textarea>
                        </div>

                        <div className="input-group" style={{marginTop: '25px'}}>
                            <label>Specific Learning Outcomes</label>
                            <textarea rows="4" value={data.outcomes} onChange={e => update('outcomes', e.target.value)}></textarea>
                        </div>

                        <div className="input-group" style={{marginTop: '25px'}}>
                            <label>Impact on Clinical Care</label>
                            <textarea rows="4" value={data.clinicalImpact} onChange={e => update('clinicalImpact', e.target.value)}></textarea>
                        </div>

                        <div style={{marginTop: '40px', display: 'flex', justifyContent: 'center'}}>
                            <button className="btn-modern" onClick={() => setMode('preview')}>
                                <i className="fa-solid fa-file-export"></i> View PDF Layout
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div style={{padding: '40px 0', background: '#f5f7fa', minHeight: '100vh'}}>
                    <div className="no-print" style={{display: 'flex', justifyContent: 'center', gap: '15px', marginBottom: '30px'}}>
                        <button className="btn-modern" onClick={() => window.print()}>
                            <i className="fa-solid fa-print"></i> Print to PDF
                        </button>
                        <button className="btn-modern" style={{background: 'white', color: 'var(--primary)', border: '2px solid var(--primary)'}} onClick={() => setMode('edit')}>
                            <i className="fa-solid fa-pen-to-square"></i> Edit Details
                        </button>
                    </div>

                    <div className="pdf-page">
                        <div className="report-header-line">
                             <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end'}}>
                                <div>
                                    <h1 style={{margin: 0, color: 'var(--primary)', fontSize: '2rem'}}>CPD Evidence Log</h1>
                                    <div style={{marginTop: '5px', fontSize: '1.2rem', fontWeight: 700}}>{data.name || 'Practitioner Name'}</div>
                                    <div style={{color: 'var(--primary)', fontWeight: 600}}>{data.jobTitle}</div>
                                </div>
                                <div style={{textAlign: 'right'}}>
                                    <div style={{fontSize: '1rem', fontWeight: 700, color: '#64748b'}}>{formatDate(data.date)}</div>
                                    <div style={{fontSize: '1.2rem', fontWeight: 700, marginTop: '5px'}}>{data.hours ? data.hours + ' Hours' : ''}</div>
                                </div>
                             </div>
                        </div>

                        <div style={{marginBottom: '20px'}}>
                            <div className="chip"><i className="fa-solid fa-tags"></i> Domain: {data.category}</div>
                        </div>

                        <div className="content-box" style={{borderLeft: '6px solid var(--primary)'}}>
                            <h3><i className="fa-solid fa-book-open"></i> Activity Overview</h3>
                            <div style={{fontSize: '1.1rem', fontWeight: 700, marginBottom: '10px', color: '#1a1a2e'}}>{data.activity || 'Untitled Activity'}</div>
                            <p style={{lineHeight: 1.6, margin: 0, whiteSpace: 'pre-wrap'}}>{data.summary}</p>
                        </div>

                        <div className="content-box">
                            <h3><i className="fa-solid fa-bullseye"></i> Learning Outcomes</h3>
                            <p style={{lineHeight: 1.6, margin: 0, whiteSpace: 'pre-wrap'}}>{data.outcomes}</p>
                        </div>

                        <div className="impact-statement">
                            <h3 style={{color: 'white', marginTop: 0, marginBottom: '10px'}}><i className="fa-solid fa-heart-pulse"></i> Clinical Impact</h3>
                            <p style={{fontSize: '1rem', lineHeight: 1.5, margin: 0, whiteSpace: 'pre-wrap'}}>{data.clinicalImpact}</p>
                        </div>

                        {data.link && (
                            <div style={{padding: '15px', border: '1px dashed var(--primary)', borderRadius: '10px', display: 'flex', alignItems: 'center', gap: '10px'}}>
                                <i className="fa-solid fa-paperclip" style={{color: 'var(--primary)'}}></i>
                                <span style={{fontWeight: 600}}>Evidence Link:</span>
                                <a href={data.link} style={{color: '#2563eb', wordBreak: 'break-all'}}>{data.link}</a>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
